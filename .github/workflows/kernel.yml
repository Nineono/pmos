name: Build Linux Kernel APK Arm64 (msm89x7)

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      set_git_repo:
        description: "repo"
        required: true
        default: "msm89x7-mainline/linux"
      set_git_branch:
        description: "branch"
        required: true
        default: "msm89x7/6.19.5"
      set_kernel_patch_version:
        description: "kernel_patch_version"
        required: true
        default: "msm8937-6.19"
      set_kernel_localversion:
        description: "kernel_localversion"
        required: true
        default: "-msm8937"

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y \
            binfmt-support qemu-user-static \
            gcc-aarch64-linux-gnu gcc-10-aarch64-linux-gnu \
            fakeroot apk-tools \
            bison flex bc git unzip \
            libncurses-dev libssl-dev libelf-dev \
            pkg-config

          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

          sudo timedatectl set-timezone "$TZ"

          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

          echo "COMPILE_STARTINGTIME=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV

          set_git_url="https://github.com/${{ github.event.inputs.set_git_repo }}.git"
          set_git_repo="${{ github.event.inputs.set_git_repo }}"

          if [[ "linux" = "${set_git_repo}" ]]; then
              set_git_url="https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git"
          fi

          echo "LINUX_GITURL=${set_git_url}" >> $GITHUB_ENV

      - name: Download source code
        run: |
          git clone --depth 1 -b ${{ github.event.inputs.set_git_branch }} ${{ env.LINUX_GITURL }} linux

      - name: Patch kernel
        run: |
          cd linux/

          for patch in `find ../patch/${{ github.event.inputs.set_kernel_patch_version }}/*.patch | LC_ALL=C sort -u`
          do
              echo "Applying $patch"
              patch -p1 -N < "$patch" || true
          done

          cp ../patch/${{ github.event.inputs.set_kernel_patch_version }}/defconfig arch/arm64/configs/diy_defconfig

      - name: Compile & Build APK
        id: compile
        run: |
          set -e
          cd linux/

          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          make diy_defconfig

          sed -i "s/^.*CONFIG_LOCALVERSION_AUTO.*$/# CONFIG_LOCALVERSION_AUTO is not set/" .config
          sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"\"/" .config

          export LOCALVERSION=${{ github.event.inputs.set_kernel_localversion }}

          make -j$(nproc)
          make modules -j$(nproc)

          KVER=$(make kernelrelease)
          echo "Kernel version: $KVER"

          # 目录
          KERNEL_DIR=/workdir/pkg
          MODULES_DIR=/workdir/pkg-modules

          mkdir -p $KERNEL_DIR/boot
          mkdir -p $KERNEL_DIR/usr/share/dtb
          mkdir -p $MODULES_DIR

          # kernel
          cp arch/arm64/boot/Image $KERNEL_DIR/boot/vmlinuz-msm89x7

          # dtb
          find arch/arm64/boot/dts -name "*.dtb" -exec cp {} $KERNEL_DIR/usr/share/dtb/ \;

          # modules
          make modules_install INSTALL_MOD_PATH=$MODULES_DIR

          # APK 元数据
          cat > $KERNEL_DIR/.PKGINFO <<EOF
          pkgname = linux-msm89x7
          pkgver = ${KVER}
          pkgrel = 0
          arch = aarch64
          pkgdesc = msm89x7 kernel
          license = GPL-2.0
          origin = linux-msm89x7
          builddate = $(date +%s)
          EOF

          cat > $MODULES_DIR/.PKGINFO <<EOF
          pkgname = linux-msm89x7-modules
          pkgver = ${KVER}
          pkgrel = 0
          arch = aarch64
          pkgdesc = msm89x7 kernel modules
          license = GPL-2.0
          origin = linux-msm89x7
          builddate = $(date +%s)
          EOF

          cd /workdir

          tar -czf linux-msm89x7-${KVER}.apk -C pkg .
          tar -czf linux-msm89x7-modules-${KVER}.apk -C pkg-modules .

          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: Kernel_APK_${{ env.COMPILE_STARTINGTIME }}
          path: /workdir/*.apk
